<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Short Video Feed</title>
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar" aria-label="Панель приложения">
        <div class="brand" aria-label="Shorts Feed">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="6" stroke="currentColor" stroke-width="1.8"></rect>
            <path d="M10 8.5L15 12L10 15.5V8.5Z" fill="currentColor"></path>
          </svg>
          <span>Short Video Feed</span>
        </div>
        <div class="status-pill" id="statusPill" aria-live="polite">Инициализация…</div>
      </header>
      <main class="feed" id="feed" aria-label="Лента коротких видео"></main>
      <div class="desktop-hint">Колесо мыши / swipe / ↑ ↓ для навигации, пробел для play/pause</div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
